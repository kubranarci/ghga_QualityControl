name: linting
on:
  pull_request:
  release:
    types: [published]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pipeline code
        uses: actions/checkout@v4

      # Note: Python 3.14 isn't officially stable yet, bumped back to 3.12 for safety
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  linting:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Check out pipeline code
        uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm-groovy-lint
        run: npm install -g npm-groovy-lint

      - name: Run npm-groovy-lint
        # Lints all .nf and .config files and saves output. '|| true' ensures the workflow 
        # continues so the artifact can upload even if linting finds errors.
        run: npm-groovy-lint > lint_log.txt || true

      - name: Run Nextflow Syntax Check
        # A quick dry-run to ensure your pipeline compiles successfully
        run: nextflow run . -preview

      - name: Save PR number
        if: ${{ always() }}
        run: echo ${{ github.event.pull_request.number }} > PR_number.txt

      - name: Upload linting log file artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: linting-logs
          path: |
            lint_log.txt
            PR_number.txt